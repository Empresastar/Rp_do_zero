<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: rgba(0,0,0,0.5); font-family: sans-serif; display: none; }
        #inventory-panel {
            width: 400px;
            background: #222;
            border: 3px solid #444;
            padding: 20px;
            border-radius: 10px;
        }
        h2 { color: white; margin-top: 0; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .slot {
            width: 80px;
            height: 80px;
            background: #333;
            border: 2px solid #555;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
            font-size: 10px;
            cursor: pointer;
        }
        .slot:hover { border-color: #ff4444; background: #3a3a3a; }
        .item-icon { color: white; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="inventory-panel">
        <h2>INVENTÁRIO</h2>
        <div class="grid">
            <div class="slot"><span class="item-icon">📦 Kit Médico</span></div>
            <div class="slot"><span class="item-icon">🍔 Lanche</span></div>
            <div class="slot"><span class="item-icon">💧 Água</span></div>
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        </div>
    </div>

    <script>
        // Função para mostrar/esconder
        window.addEventListener('message', (event) => {
            if (event.data === 'toggleInventory') {
                const isVisible = document.body.style.display === 'flex';
                document.body.style.display = isVisible ? 'none' : 'flex';
            }
        });
    </script>
</body>
</html>

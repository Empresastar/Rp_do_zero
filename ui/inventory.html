<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; margin-top: 20px; }
        .slot { width: 80px; height: 80px; background: #333; border: 2px solid #444; border-radius: 8px; }
        h2 { color: #ff4444; margin: 0; }
    </style>
</head>
<body>
    <h2>MOCHILA</h2>
    <div class="grid">
        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>
    <p style="font-size: 10px;">Pressione I para sair</p>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rp do Zero - Oficial</title>
    <style>
        /* MANTENDO SEUS ESTILOS ORIGINAIS */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: sans-serif;
        }

        #canvas-container { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }

        /* Interface do Usuário (HUD, Chat, etc) */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Deixa o clique passar para o jogo */
        }

        #hud-frame {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 400px;
            height: 250px;
            border: none;
            pointer-events: auto;
        }

        /* O INVENTÁRIO (Aqui está o segredo) */
        #inv-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Ele começa invisível */
            z-index: 100; /* Fica na frente de tudo quando abre */
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="game-ui">
        <iframe src="ui/hud.html" id="hud-frame"></iframe>
        
        <iframe src="ui/inventory.html" id="inv-frame"></iframe>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module" src="engine/main.js"></script>

    <script>
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            // Lógica para Abrir/Fechar Inventário com a tecla I
            if (key === 'i') {
                const inv = document.getElementById('inv-frame');
                if (inv) {
                    if (inv.style.display === 'none' || inv.style.display === '') {
                        inv.style.display = 'block';
                        console.log("Inventário: Aberto");
                    } else {
                        inv.style.display = 'none';
                        console.log("Inventário: Fechado");
                    }
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu RP - Completo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* IFRAME DO INVENTÁRIO - CONFIGURAÇÃO FORÇADA */
        #inv-frame {
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 500px; 
            height: 400px; 
            z-index: 9999; 
            border: 4px solid #ff4444; 
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            background: #1a1a1a;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <iframe src="ui/inventory.html" id="inv-frame"></iframe>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module" src="engine/main.js"></script>

    <script>
        // Lógica da Tecla I
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'i') {
                const inv = document.getElementById('inv-frame');
                if (inv.style.display === 'none' || inv.style.display === '') {
                    inv.style.display = 'block';
                    console.log("Inventário aberto na tela!");
                } else {
                    inv.style.display = 'none';
                    console.log("Inventário fechado!");
                }
            }
        });
    </script>
</body>
</html>

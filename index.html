<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu RP do Zero</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos para organizar as camadas da tela */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Deixa o clique passar para o jogo por padrão */
        }

        /* Iframes precisam de configurações específicas para não travarem o jogo */
        iframe {
            position: absolute;
            border: none;
            background: transparent;
            pointer-events: auto; /* Permite clicar dentro do chat/inventário */
        }

        #hud-frame {
            bottom: 0;
            left: 0;
            width: 500px;
            height: 300px;
        }

        #inv-frame {
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Começa escondido */
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <iframe src="ui/hud.html" id="hud-frame"></iframe>
        
        <iframe src="ui/inventory.html" id="inv-frame"></iframe>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module" src="engine/main.js"></script>

    <script>
        // LÓGICA PARA ABRIR O INVENTÁRIO COM A TECLA 'I'
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'i') {
                const inv = document.getElementById('inv-frame');
                
                if (inv.style.display === 'none' || inv.style.display === '') {
                    inv.style.display = 'block';
                    // Avisa o iframe do inventário para se ativar
                    inv.contentWindow.postMessage('toggleInventory', '*');
                } else {
                    inv.style.display = 'none';
                    inv.contentWindow.postMessage('toggleInventory', '*');
                }
            }
        });
    </script>

</body>
</html>

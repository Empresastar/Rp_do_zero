<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu RP - Completo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* CAMADA DA INTERFACE */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* HUD (FOME, SEDE, CHAT) - Fica sempre visível */
        #hud-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* Deixa clicar no jogo através do HUD */
        }

        /* INVENTÁRIO - Só aparece no 'I' */
        #inv-frame {
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 500px; 
            height: 400px; 
            z-index: 9999; 
            border: 4px solid #ff4444; 
            border-radius: 15px;
            background: #1a1a1a;
            pointer-events: auto; /* Permite clicar nos itens */
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="game-ui">
        <iframe src="ui/hud.html" id="hud-frame"></iframe>

        <iframe src="ui/inventory.html" id="inv-frame"></iframe>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module" src="engine/main.js"></script>

    <script>
        // Tecla I - Inventário
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'i') {
                const inv = document.getElementById('inv-frame');
                if (inv.style.display === 'none' || inv.style.display === '') {
                    inv.style.display = 'block';
                    console.log("HUD visível + Inventário aberto!");
                } else {
                    inv.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>

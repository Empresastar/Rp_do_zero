<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu RP - Interface Corrigida</title>
    <style>
        /* 1. O JOGO OCUPA TUDO AO FUNDO */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Fica no fundo */
        }

        /* 2. CAMADA DA INTERFACE (HUD E INV) */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; /* Fica na frente do jogo */
            pointer-events: none; /* Deixa o clique passar para o jogo */
        }

        /* CHAT (HUD) */
        #hud-frame {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 400px;
            height: 250px;
            border: none;
            pointer-events: auto; /* Permite clicar no chat */
        }

        /* INVENTÁRIO (OCUPA A TELA TODA) */
        #inv-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Começa escondido */
            z-index: 100;
            pointer-events: auto; /* Permite clicar nos itens */
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="game-ui">
        <iframe src="ui/hud.html" id="hud-frame"></iframe>
        <iframe src="ui/inventory.html" id="inv-frame"></iframe>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module" src="engine/main.js"></script>

    <script>
        // LÓGICA DO INVENTÁRIO (TECLA I)
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'i') {
                const inv = document.getElementById('inv-frame');
                if (inv.style.display === 'none' || inv.style.display === '') {
                    inv.style.display = 'block';
                } else {
                    inv.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
